<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish — All Topics Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .flip-card { perspective: 1000px; }
    .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; }
    .flipped .flip-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-white" x-data="quiz()" x-cloak>

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Spanish Flashcards</h1>
      <p class="text-sm text-slate-400">All Topics · Hard · <span x-text="cards.length"></span> cards</p>
    </div>
    <div class="flex items-center gap-4 text-sm text-slate-400">
      <span>Card <span x-text="current + 1"></span> of <span x-text="cards.length"></span></span>
      <span class="text-green-400">&#10003; <span x-text="correct"></span></span>
      <span class="text-red-400">&#10007; <span x-text="incorrect"></span></span>
    </div>
  </header>

  <!-- Progress bar -->
  <div class="h-1 bg-slate-700">
    <div class="h-1 bg-indigo-500 transition-all duration-300"
         :style="`width: ${((current + 1) / cards.length) * 100}%`"></div>
  </div>

  <!-- Topic badge -->
  <div class="flex justify-center pt-6">
    <span class="px-3 py-1 rounded-full text-xs font-semibold tracking-wide uppercase"
          :class="{
            'bg-blue-700 text-blue-200':    cards[current].topic === 'Preterite AR',
            'bg-purple-700 text-purple-200': cards[current].topic === 'Preterite ER/IR',
            'bg-pink-700 text-pink-200':    cards[current].topic === 'Irregular Preterite',
            'bg-yellow-700 text-yellow-200': cards[current].topic === 'Future Tense',
            'bg-green-700 text-green-200':  cards[current].topic === 'Reflexive Verbs',
            'bg-orange-700 text-orange-200': cards[current].topic === 'Food Vocabulary',
            'bg-red-700 text-red-200':      cards[current].topic === 'Spelling Changes',
            'bg-teal-700 text-teal-200':    cards[current].topic === 'Present Tense',
            'bg-cyan-700 text-cyan-200':    cards[current].topic === 'Irregular Present',
            'bg-lime-700 text-lime-200':    cards[current].topic === 'Radical-Changing',
            'bg-violet-700 text-violet-200': cards[current].topic === 'Connectors &amp; Opinions',
            'bg-amber-700 text-amber-200':  cards[current].topic === 'Hobbies &amp; Work'
          }"
          x-text="cards[current].topic"></span>
  </div>

  <!-- Card area -->
  <main class="flex flex-col items-center justify-center px-4 py-8 gap-8">

    <!-- Flashcard -->
    <div class="flip-card w-full max-w-2xl cursor-pointer" :class="{ flipped: revealed }" @click="reveal()">
      <div class="flip-inner relative" style="min-height: 340px;">

        <!-- Front (Question) -->
        <div class="flip-front absolute inset-0 bg-slate-800 rounded-2xl border border-slate-700 p-8 flex flex-col justify-between shadow-xl">
          <div class="flex items-start gap-3">
            <span class="shrink-0 w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-sm font-bold"
                  x-text="current + 1"></span>
            <p class="text-lg leading-relaxed text-white" x-html="cards[current].q"></p>
          </div>
          <div x-show="cards[current].img" class="mt-4">
            <img :src="cards[current].img" :alt="cards[current].imgAlt || 'Diagram'"
                 class="rounded-lg max-h-40 mx-auto object-contain border border-slate-600">
          </div>
          <p class="text-slate-500 text-sm text-center mt-4">Click to reveal answer</p>
        </div>

        <!-- Back (Answer) -->
        <div class="flip-back absolute inset-0 bg-indigo-900 rounded-2xl border border-indigo-700 p-8 flex flex-col justify-between shadow-xl">
          <div>
            <p class="text-xs uppercase tracking-widest text-indigo-400 mb-3 font-semibold">Answer</p>
            <p class="text-lg leading-relaxed text-white" x-html="cards[current].a"></p>
          </div>
          <p class="text-slate-400 text-sm text-center mt-4">Mark yourself below</p>
        </div>

      </div>
    </div>

    <!-- Controls — hidden until revealed -->
    <div x-show="revealed" x-transition class="flex gap-4">
      <button @click="mark(false)"
              class="flex items-center gap-2 px-6 py-3 rounded-xl bg-red-600 hover:bg-red-500 transition font-semibold">
        &#10007; Got it wrong
      </button>
      <button @click="mark(true)"
              class="flex items-center gap-2 px-6 py-3 rounded-xl bg-green-600 hover:bg-green-500 transition font-semibold">
        &#10003; Got it right
      </button>
    </div>

    <!-- Reveal button when not yet flipped -->
    <div x-show="!revealed" x-transition>
      <button @click="reveal()"
              class="px-8 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition font-semibold">
        Show Answer
      </button>
    </div>

  </main>

  <!-- Completion screen -->
  <div x-show="done" x-transition
       class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center gap-6 p-8">
    <h2 class="text-3xl font-bold">Quiz Complete!</h2>
    <div class="flex gap-8 text-2xl">
      <div class="text-center"><p class="text-green-400 font-bold" x-text="correct"></p><p class="text-slate-400 text-sm">Correct</p></div>
      <div class="text-center"><p class="text-red-400 font-bold" x-text="incorrect"></p><p class="text-slate-400 text-sm">Incorrect</p></div>
      <div class="text-center"><p class="text-yellow-400 font-bold" x-text="Math.round((correct/cards.length)*100) + '%'"></p><p class="text-slate-400 text-sm">Score</p></div>
    </div>
    <div class="flex gap-4">
      <button @click="restart(false)"
              class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition font-semibold">
        Restart All
      </button>
      <button @click="restart(true)" x-show="incorrect > 0"
              class="px-6 py-3 rounded-xl bg-red-700 hover:bg-red-600 transition font-semibold">
        Retry Wrong Cards
      </button>
    </div>
  </div>

  <script>
    function quiz() {
      return {
        cards: CARDS,
        current: 0,
        revealed: false,
        correct: 0,
        incorrect: 0,
        done: false,
        wrongCards: [],

        reveal() {
          this.revealed = true;
        },
        mark(isCorrect) {
          if (isCorrect) this.correct++;
          else { this.incorrect++; this.wrongCards.push(this.cards[this.current]); }
          this.next();
        },
        next() {
          if (this.current < this.cards.length - 1) {
            this.current++;
            this.revealed = false;
          } else {
            this.done = true;
          }
        },
        restart(wrongOnly) {
          this.cards = wrongOnly ? [...this.wrongCards] : CARDS;
          this.current = 0;
          this.revealed = false;
          this.correct = 0;
          this.incorrect = 0;
          this.done = false;
          this.wrongCards = [];
        }
      }
    }

    const CARDS = [

      // ─── TOPIC 1: Preterite AR Verbs (4 cards) ───────────────────────────────

      {
        topic: "Preterite AR",
        q: "Conjugate <strong>hablar</strong> in the preterite tense for all six persons.<br><br><em>(yo, t&uacute;, &eacute;l/ella, nosotros, vosotros, ellos/ellas)</em>",
        a: "<strong>yo</strong> habl&eacute;<br><strong>t&uacute;</strong> hablaste<br><strong>&eacute;l/ella</strong> habl&oacute;<br><strong>nosotros</strong> hablamos<br><strong>vosotros</strong> hablasteis<br><strong>ellos/ellas</strong> hablaron",
        img: "../images/spanish/preterite_ar_verbs.jpg",
        imgAlt: "Preterite AR verb conjugation table"
      },
      {
        topic: "Preterite AR",
        q: "Translate into Spanish using the <strong>preterite tense</strong>:<br><br><em>&ldquo;Last Saturday we bought fresh tomatoes and rice at the market.&rdquo;</em>",
        a: "<strong>El s&aacute;bado pasado compramos tomates frescos y arroz en el mercado.</strong><br><br>Key points: <em>compramos</em> (nosotros preterite of <em>comprar</em>); <em>el s&aacute;bado pasado</em> = last Saturday."
      },
      {
        topic: "Preterite AR",
        q: "Error correction — find and fix the <strong>one</strong> mistake:<br><br><em>&ldquo;Ayer yo habl&oacute; con mi madre por tel&eacute;fono.&rdquo;</em>",
        a: "Error: <strong>habl&oacute;</strong> &rarr; should be <strong>habl&eacute;</strong><br><br><em>habl&oacute;</em> is the &eacute;l/ella form. With <em>yo</em>, the preterite of <em>hablar</em> is <em>habl&eacute;</em> (note the accent on the final &eacute;).<br><br>Correct sentence: <em>Ayer yo habl&eacute; con mi madre por tel&eacute;fono.</em>"
      },
      {
        topic: "Preterite AR",
        q: "Fill in the gap with the correct preterite form of the verb in brackets:<br><br><em>&ldquo;La semana pasada, mis amigos ________ (escuchar) m&uacute;sica en el parque.&rdquo;</em>",
        a: "<strong>escucharon</strong><br><br>Subject is <em>mis amigos</em> = ellos/ellas &rarr; <em>-aron</em> ending for preterite -AR verbs.<br><br>Full sentence: <em>La semana pasada, mis amigos escucharon m&uacute;sica en el parque.</em>"
      },

      // ─── TOPIC 2: Preterite ER & IR Verbs (4 cards) ──────────────────────────

      {
        topic: "Preterite ER/IR",
        q: "Give the full preterite conjugation of <strong>comer</strong> (to eat) for all six persons.<br><br><em>Note: ER and IR verbs share identical preterite endings.</em>",
        a: "<strong>yo</strong> com&iacute;<br><strong>t&uacute;</strong> comiste<br><strong>&eacute;l/ella</strong> comi&oacute;<br><strong>nosotros</strong> comimos<br><strong>vosotros</strong> comisteis<br><strong>ellos/ellas</strong> comieron",
        img: "../images/spanish/preterite_er_ir_verbs.jpg",
        imgAlt: "Preterite ER and IR verb conjugation table"
      },
      {
        topic: "Preterite ER/IR",
        q: "Translate into Spanish using the <strong>preterite tense</strong>:<br><br><em>&ldquo;She ate a Spanish omelette and drank a glass of water for lunch.&rdquo;</em>",
        a: "<strong>Ella comi&oacute; una tortilla espa&ntilde;ola y bebi&oacute; un vaso de agua para comer.</strong><br><br>Key points: <em>comi&oacute;</em> (preterite of <em>comer</em>); <em>bebi&oacute;</em> (preterite of <em>beber</em>); <em>para comer</em> = for lunch."
      },
      {
        topic: "Preterite ER/IR",
        q: "Error correction — find and fix the <strong>one</strong> mistake:<br><br><em>&ldquo;El a&ntilde;o pasado, ellos viv&iacute; en Barcelona.&rdquo;</em>",
        a: "Error: <strong>viv&iacute;</strong> &rarr; should be <strong>vivieron</strong><br><br><em>viv&iacute;</em> is the <em>yo</em> preterite form. The subject is <em>ellos</em>, so the correct ending is <em>-ieron</em>.<br><br>Correct sentence: <em>El a&ntilde;o pasado, ellos vivieron en Barcelona.</em>"
      },
      {
        topic: "Preterite ER/IR",
        q: "Translate this Spanish sentence into <strong>English</strong>:<br><br><em>&ldquo;Ayer por la tarde, nosotros comimos paella valenciana en un restaurante cerca del centro.&rdquo;</em>",
        a: "<strong>&ldquo;Yesterday afternoon, we ate Valencian paella in a restaurant near the centre.&rdquo;</strong><br><br>Key vocab: <em>ayer por la tarde</em> = yesterday afternoon; <em>cerca del centro</em> = near the centre/town centre."
      },

      // ─── TOPIC 3: Irregular Verbs in the Preterite (4 cards) ─────────────────

      {
        topic: "Irregular Preterite",
        q: "Give the full preterite conjugation of <strong>ir / ser</strong> (to go / to be) for all six persons.<br><br><em>Hint: they share the same forms in the preterite.</em>",
        a: "<strong>yo</strong> fui<br><strong>t&uacute;</strong> fuiste<br><strong>&eacute;l/ella</strong> fue<br><strong>nosotros</strong> fuimos<br><strong>vosotros</strong> fuisteis<br><strong>ellos/ellas</strong> fueron<br><br>Context makes it clear which verb is meant: <em>Fui al mercado</em> = I went to the market; <em>Fue muy dif&iacute;cil</em> = It was very difficult.",
        img: "../images/spanish/preterite_irregular_verbs.jpg",
        imgAlt: "Irregular preterite verb conjugation table"
      },
      {
        topic: "Irregular Preterite",
        q: "Translate into Spanish using the <strong>preterite tense</strong>:<br><br><em>&ldquo;Last week my sister went to the market and bought ingredients for a seafood paella.&rdquo;</em>",
        a: "<strong>La semana pasada, mi hermana fue al mercado y compr&oacute; ingredientes para una paella de marisco.</strong><br><br>Key points: <em>fue</em> (preterite of <em>ir</em>); <em>compr&oacute;</em> (preterite of <em>comprar</em>); <em>de marisco</em> = with seafood."
      },
      {
        topic: "Irregular Preterite",
        q: "Fill in the gap with the correct preterite form of <strong>hacer</strong> (to do / make):<br><br><em>&ldquo;El s&aacute;bado pasado, mi madre ________ una paella deliciosa para toda la familia.&rdquo;</em>",
        a: "<strong>hizo</strong><br><br>Subject is <em>mi madre</em> = &eacute;l/ella &rarr; preterite of <em>hacer</em> is <em>hizo</em> (irregular stem <em>hic-</em> with spelling change z &rarr; c before o).<br><br>Full sentence: <em>El s&aacute;bado pasado, mi madre hizo una paella deliciosa para toda la familia.</em>"
      },
      {
        topic: "Irregular Preterite",
        q: "These two sentences both use irregular preterites. Translate them into English:<br><br>1. <em>Ayer tuve mucha tarea y no pude salir.</em><br>2. <em>El fin de semana pasado, ellos fueron al cine y lo pasaron muy bien.</em>",
        a: "1. <strong>&ldquo;Yesterday I had a lot of homework and I could not go out.&rdquo;</strong><br>&nbsp;&nbsp;&nbsp;(<em>tuve</em> = I had [tener]; <em>pude</em> = I was able to [poder])<br><br>2. <strong>&ldquo;Last weekend, they went to the cinema and had a great time.&rdquo;</strong><br>&nbsp;&nbsp;&nbsp;(<em>fueron</em> = they went [ir]; <em>lo pasaron muy bien</em> = they had a great time)"
      },

      // ─── TOPIC 4: Future Tense (4 cards) ─────────────────────────────────────

      {
        topic: "Future Tense",
        q: "Explain the structure of the <strong>near future</strong> in Spanish and give three example sentences using different subjects.<br><br><em>(Use voy a / vas a / va a + infinitive)</em>",
        a: "Structure: <strong>[present tense of <em>ir</em>] + a + infinitive</strong><br><br>Examples:<br>&bull; <em>Voy a comer una paella ma&ntilde;ana.</em> (I am going to eat a paella tomorrow.)<br>&bull; <em>Va a comprar huevos en el mercado.</em> (He/She is going to buy eggs at the market.)<br>&bull; <em>Vamos a visitar Madrid el verano que viene.</em> (We are going to visit Madrid next summer.)"
      },
      {
        topic: "Future Tense",
        q: "Translate into Spanish using the <strong>near future tense</strong>:<br><br><em>&ldquo;Next Saturday I am going to wake up early, eat scrambled eggs for breakfast, and go to the market with my family.&rdquo;</em>",
        a: "<strong>El s&aacute;bado que viene voy a despertarme temprano, voy a comer huevos revueltos para desayunar y voy a ir al mercado con mi familia.</strong><br><br>Key points: <em>despertarme</em> (reflexive infinitive); <em>huevos revueltos</em> = scrambled eggs; <em>el s&aacute;bado que viene</em> = next Saturday."
      },
      {
        topic: "Future Tense",
        q: "Error correction — find and fix the <strong>one</strong> mistake:<br><br><em>&ldquo;Ma&ntilde;ana, nosotros vamos a compramos frutas en el supermercado.&rdquo;</em>",
        a: "Error: <strong>compramos</strong> &rarr; should be <strong>comprar</strong><br><br>After <em>ir a</em>, you must use the <strong>infinitive</strong>, not a conjugated form.<br><br>Correct sentence: <em>Ma&ntilde;ana, nosotros vamos a comprar frutas en el supermercado.</em>"
      },
      {
        topic: "Future Tense",
        q: "Write a sentence that uses <strong>both the preterite and the near future</strong> tense to contrast past and future actions.<br><br><em>Hint: use a time marker like <em>ayer</em> and <em>ma&ntilde;ana</em>.</em>",
        a: "Model answer: <strong><em>Ayer com&iacute; arroz, pero ma&ntilde;ana voy a comer una paella de marisco.</em></strong><br>(Yesterday I ate rice, but tomorrow I am going to eat a seafood paella.)<br><br>Other valid answers use any preterite form + <em>ir a</em> + infinitive with appropriate time markers."
      },

      // ─── TOPIC 5: Reflexive Verbs (5 cards) ──────────────────────────────────

      {
        topic: "Reflexive Verbs",
        q: "Give the full present tense conjugation of <strong>lavarse</strong> (to wash oneself) for all six persons, including the reflexive pronoun each time.",
        a: "<strong>yo</strong> me lavo<br><strong>t&uacute;</strong> te lavas<br><strong>&eacute;l/ella</strong> se lava<br><strong>nosotros</strong> nos lavamos<br><strong>vosotros</strong> os lav&aacute;is<br><strong>ellos/ellas</strong> se lavan<br><br>The reflexive pronoun always matches the subject and precedes the conjugated verb."
      },
      {
        topic: "Reflexive Verbs",
        q: "Fill in the gap with the correct reflexive pronoun and verb form of <strong>despertarse</strong> (stem-changing: e &rarr; ie):<br><br><em>&ldquo;Normalmente, mis padres ________ ________ a las seis de la ma&ntilde;ana.&rdquo;</em>",
        a: "<strong>se despiertan</strong><br><br>Subject is <em>mis padres</em> = ellos/ellas &rarr; reflexive pronoun <em>se</em> + stem-changing form <em>despiertan</em> (e &rarr; ie in all forms except nosotros/vosotros).<br><br>Full sentence: <em>Normalmente, mis padres se despiertan a las seis de la ma&ntilde;ana.</em>"
      },
      {
        topic: "Reflexive Verbs",
        q: "Error correction — find and fix the <strong>one</strong> mistake:<br><br><em>&ldquo;Nosotros me levantamos a las siete todos los d&iacute;as.&rdquo;</em>",
        a: "Error: <strong>me</strong> &rarr; should be <strong>nos</strong><br><br>The reflexive pronoun must agree with the subject. Subject is <em>nosotros</em> &rarr; pronoun is <em>nos</em>.<br><br>Correct sentence: <em>Nosotros nos levantamos a las siete todos los d&iacute;as.</em>"
      },
      {
        topic: "Reflexive Verbs",
        q: "Translate into Spanish, using the correct reflexive verbs:<br><br><em>&ldquo;On school days I wake up at seven, get dressed quickly, and go to bed at ten thirty at night.&rdquo;</em>",
        a: "<strong>Los d&iacute;as de colegio me despierto a las siete, me visto r&aacute;pidamente y me acuesto a las diez y media de la noche.</strong><br><br>Key verbs: <em>despertarse</em> &rarr; <em>me despierto</em>; <em>vestirse</em> &rarr; <em>me visto</em>; <em>acostarse</em> &rarr; <em>me acuesto</em> (all stem-changing)."
      },
      {
        topic: "Reflexive Verbs",
        q: "Pedro says: <em>&ldquo;El s&aacute;bado pasado me levanté a las ocho, me duché y desayuné.&rdquo;</em><br><br>Rewrite the three verbs in the <strong>nosotros</strong> form (as if Pedro and his friend did it together), keeping the preterite tense.",
        a: "<strong>nos levantamos, nos duchamos, desayunamos</strong><br><br>Full sentence: <em>El s&aacute;bado pasado nos levantamos a las ocho, nos duchamos y desayunamos.</em><br><br>Note: <em>levantarse</em> and <em>ducharse</em> are reflexive (pronoun changes to <em>nos</em>); <em>desayunar</em> is not reflexive (no pronoun needed). The nosotros preterite of -AR verbs is the same as the present tense: <em>-amos</em>."
      },

      // ─── TOPIC 6: Food Vocabulary (4 cards) ──────────────────────────────────

      {
        topic: "Food Vocabulary",
        q: "Name the <strong>four ways to prepare eggs</strong> in Spanish (with their English meanings), as studied in class.",
        a: "&bull; <strong>Fritos</strong> — fried<br>&bull; <strong>Pasados por agua</strong> — soft boiled<br>&bull; <strong>Revueltos</strong> — scrambled<br>&bull; <strong>Al horno</strong> — baked",
        img: "../images/spanish/food_vocab.png",
        imgAlt: "Spanish food vocabulary diagram"
      },
      {
        topic: "Food Vocabulary",
        q: "Name the <strong>four types of paella</strong> in Spanish (with their English meanings), as studied in class.",
        a: "&bull; <strong>De marisco</strong> — with seafood<br>&bull; <strong>Negra</strong> — black (coloured with squid ink)<br>&bull; <strong>Valenciana</strong> — from Valencia (traditional, with chicken and rabbit)<br>&bull; <strong>Vegetariana</strong> — vegetarian"
      },
      {
        topic: "Food Vocabulary",
        q: "Translate into Spanish, using precise food vocabulary:<br><br><em>&ldquo;For breakfast yesterday I ate two fried eggs with toast, but next week I am going to try scrambled eggs.&rdquo;</em>",
        a: "<strong>Ayer para desayunar com&iacute; dos huevos fritos con tostadas, pero la semana que viene voy a probar los huevos revueltos.</strong><br><br>Key vocab: <em>huevos fritos</em> = fried eggs; <em>huevos revueltos</em> = scrambled eggs; <em>la semana que viene</em> = next week; <em>probar</em> = to try (taste)."
      },
      {
        topic: "Food Vocabulary",
        q: "Translate this Spanish sentence into <strong>English</strong>, identifying all food and cooking vocabulary:<br><br><em>&ldquo;En el restaurante pedi&oacute; una paella negra, pero yo prefer&iacute; los huevos pasados por agua con pan.&rdquo;</em>",
        a: "<strong>&ldquo;In the restaurant he/she ordered a black paella, but I preferred the soft-boiled eggs with bread.&rdquo;</strong><br><br>Food vocabulary: <em>paella negra</em> = black paella (squid ink); <em>huevos pasados por agua</em> = soft-boiled eggs; <em>pan</em> = bread.<br>Grammar: <em>pidi&oacute;</em> = preterite of <em>pedir</em> (irregular stem change e &rarr; i); <em>prefer&iacute;</em> = preterite of <em>preferir</em>."
      },

      // ─── TOPIC 7: Spelling Changes in the Preterite Yo-form (4 cards) ─────────

      {
        topic: "Spelling Changes",
        q: "Why does the verb <strong>buscar</strong> change spelling in the <em>yo</em> preterite form? Write the correct <em>yo</em> preterite and explain the rule.<br><br><em>Context: &ldquo;I searched online for tickets last night.&rdquo;</em>",
        a: "<strong>buqué</strong> &rarr; WRONG. Correct form: <strong>busqu&eacute;</strong><br><br>Rule: verbs ending in <strong>-CAR</strong> change <em>c &rarr; qu</em> before &eacute; to preserve the hard /k/ sound (writing <em>buscé</em> would be pronounced /s/).<br><br>Sentence: <em>Anoche busqu&eacute; entradas por internet.</em>"
      },
      {
        topic: "Spelling Changes",
        q: "Error correction — find and fix the <strong>one</strong> mistake:<br><br><em>&ldquo;Ayer llegé tarde al colegio porque perdí el autobús.&rdquo;</em>",
